<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Title -->
    <title>Food Network</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Banner Area Start -->
    <section id="banner-area">
      <div class="wrapper">
        <div class="flexible-context">
          <div class="half-width">
            <h1 class="big-heading">
              <span class="blue-color">Skip</span> The Diet, <br />
              Just Eat Healthy <br />
              With Food Network
            </h1>
            <p class="description">
              Imagine you don't need a diet because we provide healthy and
              delicious food for you!
            </p>
            <a
              class="btn"
              href="https://github.com/faysalchowdhury99"
              target="_blank"
              >Order Food</a
            >
          </div>
          <div class="half-width">
            <img src="images/banner-image.png" alt="banner-image" />
          </div>
        </div>
      </div>
    </section>
    <!-- Banner Area End -->
  </body>
</html>
